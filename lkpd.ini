Kasus 1: Aplikasi E-Commerce "BelanjaYuk"
Situasi: Aplikasi BelanjaYuk memiliki tampilan yang sangat indah dengan warna pastel. Namun, pengguna sering mengeluh karena tombol "Beli Sekarang" berukuran kecil, tersembunyi di bawah, dan warna teksnya hampir sama dengan warna background (putih di atas krem). Pengguna sering salah tekan tombol atau kebingungan saat checkout.
