D. Tugas Mandiri: Analisis Aplikasi
Buka 1 aplikasi mobile yang sering Anda gunakan (contoh: Gojek, Tokopedia, Instagram).
Cari 1 elemen UI yang menurut Anda menarik dan intuitif. Ambil screenshot dan jelaskan alasannya.
Cari 1 elemen UX yang menurut Anda membingungkan. Ambil screenshot dan jelaskan bagaimana seharusnya elemen tersebut diperbaiki.
