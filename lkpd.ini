Kasus 2: Aplikasi Absensi Pegawai "Hadir"
Situasi: Aplikasi Hadir digunakan oleh karyawan lapangan. Saat ingin melakukan absensi, aplikasi meminta karyawan mengisi 10 kolom data (nama, NIK, lokasi, alasan, foto, dll) di satu halaman yang sama. Formulir ini membuat waktu absensi lama dan sering terjadi error jaringan, menyebabkan data hilang.
Pertanyaan:
Jelaskan mengapa desain formulir tersebut buruk dari sisi User Experience (UX).
………………………………………..…………………………………………….
Bagaimana penerapan prinsip Minimalisasi Kesalahan/Sederhana untuk memperbaiki alur absensi tersebut?
………………………………………..…………………………………………….
