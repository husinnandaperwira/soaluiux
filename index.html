<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LKPD Siswa</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --ink: #14161a;
      --muted: #5b6470;
      --border: rgba(20, 22, 26, 0.14);
      --card: #ffffff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      --accent: #ff6a00;
      --accent2: #ff914d;
      --darkShape: #2b2b2b;
      --ring: rgba(255, 106, 0, 0.22);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: absolute;
      filter: blur(0px);
      transform: translateZ(0);
    }

    .blob.orange {
      right: -220px;
      top: 60px;
      width: 720px;
      height: 720px;
      background: radial-gradient(circle at 30% 30%, var(--accent2), var(--accent));
      border-radius: 55% 45% 55% 45% / 55% 45% 55% 45%;
    }

    .blob.dark {
      left: -260px;
      top: 260px;
      width: 620px;
      height: 620px;
      background: radial-gradient(circle at 30% 30%, #3a3a3a, var(--darkShape));
      border-radius: 50% 50% 48% 52% / 54% 46% 54% 46%;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 56px auto;
      padding: 0 16px 140px;
    }

    .frame {
      background: var(--card);
      border: 2px solid rgba(20, 22, 26, 0.85);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .top {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(20, 22, 26, 0.10);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 14px;
      z-index: 50;
      padding: 0 16px;
    }

    .dock-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(20, 22, 26, 0.14);
      border-radius: 18px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.22);
      padding: 12px;
    }

    .dock-left { min-width: 0; display: grid; gap: 6px; }

    .dock-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    @media (max-width: 560px) {
      .dock-inner { flex-direction: column; align-items: stretch; }
      .dock-actions { justify-content: stretch; }
      .dock-actions button { width: 100%; }
    }

    .title {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.3px;
      font-weight: 800;
    }

    .subtitle {
      margin: -6px 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .row { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 720px) { .row { grid-template-columns: 1fr 1fr; } }

    label { display: grid; gap: 6px; font-size: 13px; color: rgba(20, 22, 26, 0.8); }

    input, textarea, button {
      font: inherit;
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    input, textarea {
      background: #fff;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: rgba(255, 106, 0, 0.55);
      box-shadow: 0 0 0 6px var(--ring);
    }

    textarea { width: 100%; min-height: 102px; resize: vertical; }

    .actions { display: grid; gap: 10px; margin-top: 14px; grid-template-columns: 1fr; }
    @media (min-width: 560px) { .actions { grid-template-columns: 1fr 1fr; } }

    button { cursor: pointer; }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      border-color: rgba(0,0,0,0.12);
      color: #fff;
      font-weight: 750;
      padding: 12px 14px;
      box-shadow: 0 14px 26px rgba(255, 106, 0, 0.25);
    }

    .btn-primary:active { transform: translateY(1px); }

    .btn-secondary {
      background: #fff;
      border-color: rgba(20, 22, 26, 0.22);
      color: rgba(20, 22, 26, 0.9);
      font-weight: 650;
    }

    .meta { margin-top: 10px; display: grid; gap: 6px; }
    .status-pill {
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 106, 0, 0.10);
      border: 1px solid rgba(255, 106, 0, 0.22);
      color: rgba(20, 22, 26, 0.82);
      font-size: 13px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .card {
      border: 1px solid rgba(20, 22, 26, 0.10);
      border-radius: 16px;
      padding: 16px;
      margin: 14px 0;
      background: rgba(255, 255, 255, 0.92);
    }

    .section-title { font-weight: 850; font-size: 18px; margin-bottom: 10px; letter-spacing: -0.1px; }
    .section-line { margin: 6px 0; color: rgba(20, 22, 26, 0.85); }

    .q-block { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(20, 22, 26, 0.10); }
    .q-title { font-weight: 750; margin-bottom: 8px; }

    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; background: rgba(255, 106, 0, 0.10); border: 1px solid rgba(255, 106, 0, 0.22); font-size: 12px; color: rgba(20, 22, 26, 0.84); }

    .two { display: grid; gap: 12px; }
    @media (min-width: 860px) { .two { grid-template-columns: 1fr 1fr; } }

    .inner-card {
      border: 1px solid rgba(20, 22, 26, 0.10);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="blob orange"></div>
    <div class="blob dark"></div>
  </div>

  <div class="container">
    <div class="frame">
      <div class="top">
        <div class="title">LKPD UI/UX</div>
        <div class="subtitle">Isi nama dan kelas, jawab pertanyaan pada setiap section, unggah screenshot pada tugas mandiri, lalu kirim jawaban.</div>

        <div class="row">
          <label>
            Nama
            <input id="studentName" type="text" placeholder="Masukkan nama" autocomplete="name" />
          </label>
          <label>
            Kelas
            <input id="studentClass" type="text" placeholder="Contoh: XI RPL 1" autocomplete="off" />
          </label>
        </div>
      </div>

      <div id="questions"></div>
    </div>

    <div class="dock" role="region" aria-label="Aksi LKPD">
      <div class="dock-inner">
        <div class="dock-left">
          <div id="status" class="status-pill"></div>
          <div id="meta" class="muted"></div>
        </div>
        <div class="dock-actions">
          <button id="btnClear" type="button" class="btn-secondary">Clear Form</button>
          <button id="btnSubmit" type="button" class="btn-primary">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUf7Qz1DXHsGRw6hUrrZFhyzdbzN5uhtF9L19quNEOriKlWD-4QbT4MFVsUN7jj0rr6A/exec";
    const LKPD_URL = "./lkpd.ini";
    const LKPD_SLUG = "dasar-ui-ux";
    const SHOW_DEV_META = false;

    const $ = (id) => document.getElementById(id);

    let lkpd = null;

    function setStatus(msg) { $("status").textContent = msg || ""; }
    function norm(s) { return (s || "").trim().replace(/\s+/g, " "); }
    function sid() {
      const name = norm($("studentName").value);
      const cls = norm($("studentClass").value);
      if (!name || !cls) return null;
      return `${name}__${cls}`;
    }
    function localKey() {
      const s = sid();
      if (!s) return null;
      return `lkpd_draft_v1__${encodeURIComponent(LKPD_SLUG)}__${encodeURIComponent(s)}`;
    }

    function placeholderLike(line) {
      const t = (line || "").trim();
      if (!t) return false;
      if (t.includes("…")) return true;
      return /^[\s._\-⋯…]+$/.test(t);
    }

    function isSectionHeader(line) {
      return /^[A-D]\.\s+/.test((line || "").trim());
    }

    function nextNonEmptyIndex(lines, start) {
      for (let i = start; i < lines.length; i++) {
        if ((lines[i] || "").trim()) return i;
      }
      return -1;
    }

    function parseLKPD(text) {
      const lines = (text || "").replace(/\r\n/g, "\n").split("\n");
      const titleLine = (lines.find(l => l.trim()) || "").trim();
      const title = titleLine || "LKPD";

      const sections = [];
      let current = null;
      let currentBlock = null;
      let qCounter = 0;

      for (let i = 0; i < lines.length; i++) {
        const raw = lines[i] || "";
        const t = raw.trim();

        if (!t) {
          if (currentBlock) currentBlock.lines.push("");
          continue;
        }

        if (isSectionHeader(t)) {
          current = { id: t[0], title: t, blocks: [], tasks: {} };
          currentBlock = { lines: [], questions: [] };
          current.blocks.push(currentBlock);
          sections.push(current);
          continue;
        }

        if (!current) continue;

        if (current.id === "D") {
          if (/^Cari 1 elemen UI\b/i.test(t)) {
            current.tasks.uiPrompt = t;
            continue;
          }
          if (/^Cari 1 elemen UX\b/i.test(t)) {
            current.tasks.uxPrompt = t;
            continue;
          }
        }

        if (current.id === "C" && /^Kasus\s+\d+\s*:/i.test(t)) {
          currentBlock = { lines: [], questions: [] };
          current.blocks.push(currentBlock);
          currentBlock.lines.push(t);
          continue;
        }

        const nextIdx = nextNonEmptyIndex(lines, i + 1);
        const nextLine = nextIdx >= 0 ? (lines[nextIdx] || "") : "";

        if (nextIdx >= 0 && placeholderLike(nextLine)) {
          qCounter++;
          currentBlock.questions.push({ id: `q${qCounter}`, text: t });
          i = nextIdx;
          continue;
        }

        if (placeholderLike(t)) continue;

        currentBlock.lines.push(t);
      }

      return { title, sections, questionCount: qCounter };
    }

    function render() {
      const root = $("questions");
      root.innerHTML = "";
      if (!lkpd) return;

      if (!lkpd.sections.length) {
        root.innerHTML = `<div class="card"><div class="q-title">LKPD tidak terdeteksi</div><div class="muted">Pastikan format memiliki section A–D dan baris titik-titik (……) sebagai kolom jawaban.</div></div>`;
        return;
      }

      for (const section of lkpd.sections) {
        const sec = document.createElement("div");
        sec.className = "card";

        const h = document.createElement("div");
        h.className = "section-title";
        h.textContent = section.title;
        sec.appendChild(h);

        for (const blockData of section.blocks) {
          for (const line of blockData.lines) {
            if (!line) {
              const spacer = document.createElement("div");
              spacer.style.height = "8px";
              sec.appendChild(spacer);
              continue;
            }
            const p = document.createElement("div");
            p.className = "section-line";
            p.textContent = line;
            sec.appendChild(p);
          }

          for (const q of blockData.questions) {
            const block = document.createElement("div");
            block.className = "q-block";

            const title = document.createElement("div");
            title.className = "q-title";
            title.textContent = q.text;

            const ta = document.createElement("textarea");
            ta.id = `ans_${q.id}`;
            ta.placeholder = "Tulis jawaban di sini...";

            block.appendChild(title);
            block.appendChild(ta);
            sec.appendChild(block);
          }
        }

        if (section.id === "D") {
          const uiPrompt = section.tasks.uiPrompt || "Cari 1 elemen UI yang menurut Anda menarik dan intuitif. Ambil screenshot dan jelaskan alasannya.";
          const uxPrompt = section.tasks.uxPrompt || "Cari 1 elemen UX yang menurut Anda membingungkan. Ambil screenshot dan jelaskan bagaimana seharusnya elemen tersebut diperbaiki.";

          const tugas = document.createElement("div");
          tugas.className = "q-block";
          tugas.innerHTML = `
            <div class="q-title"><span class="pill">Upload Screenshot</span></div>
            <div class="two">
              <div class="inner-card">
                <div class="q-title" style="font-weight:750;">${uiPrompt}</div>
                <label style="min-width:auto;">
                  Screenshot UI (jpg/png)
                  <input id="uiShot" type="file" accept="image/*" />
                </label>
                <label style="min-width:auto;">
                  Alasan (UI)
                  <textarea id="uiReason" placeholder="Jelaskan alasannya..."></textarea>
                </label>
                <div id="uiInfo" class="muted"></div>
              </div>

              <div class="inner-card">
                <div class="q-title" style="font-weight:750;">${uxPrompt}</div>
                <label style="min-width:auto;">
                  Screenshot UX (jpg/png)
                  <input id="uxShot" type="file" accept="image/*" />
                </label>
                <label style="min-width:auto;">
                  Alasan/Perbaikan (UX)
                  <textarea id="uxReason" placeholder="Jelaskan kebingungan dan perbaikannya..."></textarea>
                </label>
                <div id="uxInfo" class="muted"></div>
              </div>
            </div>
            <div class="muted" style="margin-top:10px;">Disarankan screenshot ukuran kecil. Sistem akan mengecilkan otomatis sebelum dikirim.</div>
          `;
          sec.appendChild(tugas);

          const uiShotEl = $("uiShot");
          const uxShotEl = $("uxShot");
          if (uiShotEl) uiShotEl.addEventListener("change", () => showFileInfo("uiShot", "uiInfo"));
          if (uxShotEl) uxShotEl.addEventListener("change", () => showFileInfo("uxShot", "uxInfo"));
        }

        root.appendChild(sec);
      }
    }

    function showFileInfo(fileInputId, infoId) {
      const el = $(fileInputId);
      const f = el.files && el.files[0];
      if (!f) { $(infoId).textContent = ""; return; }
      $(infoId).textContent = `${f.name} • ${(f.size / 1024).toFixed(0)} KB`;
    }

    async function loadLKPD() {
      setStatus("Memuat LKPD...");
      const res = await fetch(LKPD_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("Gagal memuat lkpd.ini");
      const text = await res.text();
      lkpd = parseLKPD(text);

      const metaEl = $("meta");
      if (SHOW_DEV_META) {
        metaEl.style.display = "";
        metaEl.textContent = `LKPD: ${lkpd.title} • Section: ${lkpd.sections.length} • Pertanyaan: ${lkpd.questionCount}`;
      } else {
        metaEl.textContent = "";
        metaEl.style.display = "none";
      }

      render();
      tryAutoLoadDraft();
      setStatus("LKPD siap.");
    }

    function forEachQuestion(fn) {
      if (!lkpd) return;
      for (const section of lkpd.sections) {
        for (const b of section.blocks) {
          for (const q of b.questions) fn(q, section);
        }
      }
    }

    function readAnswers() {
      const out = {};
      if (!lkpd) return out;
      forEachQuestion((q) => {
        const el = $(`ans_${q.id}`);
        out[q.id] = el ? el.value : "";
      });
      return out;
    }

    function writeAnswers(answers) {
      if (!lkpd) return;
      forEachQuestion((q) => {
        const el = $(`ans_${q.id}`);
        if (el) el.value = (answers && typeof answers[q.id] === "string") ? answers[q.id] : "";
      });
    }

    async function fileToJpegBase64(file, maxSide = 1280, quality = 0.82) {
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ""));
        r.onerror = () => reject(new Error("Gagal membaca file"));
        r.readAsDataURL(file);
      });

      const img = await new Promise((resolve, reject) => {
        const i = new Image();
        i.onload = () => resolve(i);
        i.onerror = () => reject(new Error("Gagal memuat gambar"));
        i.src = dataUrl;
      });

      const w = img.naturalWidth || img.width;
      const h = img.naturalHeight || img.height;
      const scale = Math.min(1, maxSide / Math.max(w, h));
      const nw = Math.max(1, Math.round(w * scale));
      const nh = Math.max(1, Math.round(h * scale));

      const canvas = document.createElement("canvas");
      canvas.width = nw;
      canvas.height = nh;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, nw, nh);

      const jpegUrl = canvas.toDataURL("image/jpeg", quality);
      const base64 = jpegUrl.split(",")[1] || "";
      return { base64, mimeType: "image/jpeg", filename: (file.name || "screenshot").replace(/\.[^.]+$/, "") + ".jpg" };
    }

    function draftPayload() {
      return {
        v: 1,
        lkpd: { slug: LKPD_SLUG, title: lkpd ? lkpd.title : "" },
        student: { name: norm($("studentName").value), class: norm($("studentClass").value) },
        answers: readAnswers(),
        tasks: {
          ui_reason: $("uiReason") ? $("uiReason").value : "",
          ux_reason: $("uxReason") ? $("uxReason").value : ""
        },
        savedAt: new Date().toISOString()
      };
    }

    function applyDraft(d) {
      if (d && d.student) {
        $("studentName").value = d.student.name || "";
        $("studentClass").value = d.student.class || "";
      }
      if (d && d.answers) writeAnswers(d.answers);
      if ($("uiReason")) $("uiReason").value = (d.tasks && d.tasks.ui_reason) ? d.tasks.ui_reason : "";
      if ($("uxReason")) $("uxReason").value = (d.tasks && d.tasks.ux_reason) ? d.tasks.ux_reason : "";
    }

    function hasAnyInput_() {
      const tas = document.querySelectorAll("#questions textarea");
      for (const ta of tas) {
        if ((ta.value || "").trim()) return true;
      }
      return false;
    }

    function tryAutoLoadDraft() {
      if (!lkpd) return;
      const k = localKey();
      if (!k) return;
      const raw = localStorage.getItem(k);
      if (!raw) return;
      if (hasAnyInput_()) return;

      let d;
      try { d = JSON.parse(raw); } catch { return; }
      applyDraft(d);
      setStatus("Draft otomatis dimuat.");
    }

    function debounce_(fn, waitMs) {
      let t = null;
      return (...args) => {
        if (t) clearTimeout(t);
        t = setTimeout(() => fn(...args), waitMs);
      };
    }

    const autoSaveDraft_ = debounce_(() => {
      if (!lkpd) return;
      const k = localKey();
      if (!k) return;
      localStorage.setItem(k, JSON.stringify(draftPayload()));
    }, 600);

    const autoLoadDraft_ = debounce_(() => {
      tryAutoLoadDraft();
    }, 200);

    async function submit() {
      if (!lkpd) await loadLKPD();

      const name = norm($("studentName").value);
      const cls = norm($("studentClass").value);
      if (!name || !cls) throw new Error("Nama dan Kelas wajib diisi.");

      const uiReasonEl = $("uiReason");
      const uxReasonEl = $("uxReason");
      const uiShotEl = $("uiShot");
      const uxShotEl = $("uxShot");
      if (!uiReasonEl || !uxReasonEl || !uiShotEl || !uxShotEl) throw new Error("Bagian upload screenshot belum termuat. Klik Load LKPD dulu.");

      const uiReason = uiReasonEl.value.trim();
      const uxReason = uxReasonEl.value.trim();
      if (!uiReason || !uxReason) throw new Error("Alasan UI dan Alasan/Perbaikan UX wajib diisi.");

      const uiFile = uiShotEl.files && uiShotEl.files[0];
      const uxFile = uxShotEl.files && uxShotEl.files[0];
      if (!uiFile || !uxFile) throw new Error("Screenshot UI dan Screenshot UX wajib diupload.");

      setStatus("Memproses screenshot...");
      const uiShot = await fileToJpegBase64(uiFile);
      const uxShot = await fileToJpegBase64(uxFile);

      const payload = {
        v: 1,
        lkpd: { slug: LKPD_SLUG, title: lkpd.title, question_count: lkpd.questionCount },
        student: { name, class: cls },
        answers: readAnswers(),
        tasks: {
          ui: { reason: uiReason, screenshot: uiShot },
          ux: { reason: uxReason, screenshot: uxShot }
        },
        client: { userAgent: navigator.userAgent, submittedAt: new Date().toISOString() }
      };

      setStatus("Mengirim jawaban ke server...");
      const body = new URLSearchParams();
      body.set("payload", JSON.stringify(payload));

      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: body.toString()
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { throw new Error("Respons server tidak valid."); }
      if (!data.ok) throw new Error(data.error || "Submit gagal.");

      setStatus(`Berhasil. Data tersimpan. Submission ID: ${data.submissionId || "-"}`);
      const k = localKey();
      if (k) localStorage.setItem(k, JSON.stringify(draftPayload()));
    }

    $("btnSubmit").addEventListener("click", () => submit().catch(e => setStatus(String(e.message || e))));

    const studentNameEl = $("studentName");
    const studentClassEl = $("studentClass");
    studentNameEl.addEventListener("input", () => { autoLoadDraft_(); autoSaveDraft_(); });
    studentClassEl.addEventListener("input", () => { autoLoadDraft_(); autoSaveDraft_(); });
    studentNameEl.addEventListener("blur", () => tryAutoLoadDraft());
    studentClassEl.addEventListener("blur", () => tryAutoLoadDraft());

    $("questions").addEventListener("input", (ev) => {
      const t = ev && ev.target;
      if (!t) return;
      if (t.tagName === "TEXTAREA" || (t.tagName === "INPUT" && t.type === "text")) autoSaveDraft_();
    });

    $("btnClear").addEventListener("click", async () => {
      if (!lkpd) await loadLKPD();
      writeAnswers({});
      if ($("uiReason")) $("uiReason").value = "";
      if ($("uxReason")) $("uxReason").value = "";
      if ($("uiShot")) $("uiShot").value = "";
      if ($("uxShot")) $("uxShot").value = "";
      const k = localKey();
      if (k) localStorage.setItem(k, JSON.stringify(draftPayload()));
      setStatus("Form dibersihkan.");
    });

    loadLKPD().catch(() => setStatus("LKPD gagal dimuat."));
  </script>
</body>
</html>
